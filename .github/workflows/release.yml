name: Release plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  PLUGIN_NAME: agent-skill-deploy

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate release metadata
        run: |
          node scripts/validate-release-metadata.mjs --tag="${GITHUB_REF_NAME}"
      - name: Run CI
        run: pnpm run ci
      - name: Generate Release Notes
        run: node scripts/release-notes.mjs --output .github-release-body.md
      - name: Prepare Release Assets
        id: release_assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir "${{ env.PLUGIN_NAME }}"
          cp main.js "${{ env.PLUGIN_NAME }}/"
          cp manifest.json "${{ env.PLUGIN_NAME }}/"
          cp styles.css "${{ env.PLUGIN_NAME }}/"
          zip -r "${{ env.PLUGIN_NAME }}.zip" "${{ env.PLUGIN_NAME }}"
          {
            echo "files<<EOF"
            printf "%s\n" "${{ env.PLUGIN_NAME }}.zip"
            printf "%s\n" "main.js"
            printf "%s\n" "manifest.json"
            printf "%s\n" "styles.css"
            printf "%s\n" "versions.json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github-release-body.md
          files: ${{ steps.release_assets.outputs.files }}
